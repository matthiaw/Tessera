spring:
  application:
    name: tessera
  datasource:
    url: jdbc:postgresql://localhost:5432/tessera
    username: tessera
    password: tessera
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: TesseraHikariPool
      maximum-pool-size: 10
      connection-init-sql: "LOAD 'age'; SET search_path = ag_catalog, \"$user\", public;"
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true

server:
  forward-headers-strategy: framework

# Phase 2 Wave 1 / SEC-06 / CONTEXT Decision 2: field-level encryption is
# feature-flagged OFF for Phase 2. The EncryptionStartupGuard refuses to boot
# if any schema_properties row has property_encrypted=TRUE while this flag is
# false. Flip to true only when the full encryption machinery lands in a
# later phase.
tessera:
  version: 0.1.0-SNAPSHOT
  kafka:
    enabled: false  # Set to true to enable Debezium/Kafka; disables in-process OutboxPoller
    lag-threshold-bytes: 104857600  # 100MB default for DebeziumSlotHealthIndicator
  security:
    field-encryption:
      enabled: false
  auth:
    jwt-signing-key: "${TESSERA_JWT_SIGNING_KEY:}"
    token-ttl-minutes: 15
    bootstrap-token: "${TESSERA_BOOTSTRAP_TOKEN:}"
  extraction:
    model: claude-sonnet-4-5
    max-tokens: 4096
    temperature: 0.0
    max-retries: 3
  connectors:
    circlead:
      base-url: "${TESSERA_CIRCLEAD_BASE_URL:http://localhost:8080}"
      model-id: "${TESSERA_CIRCLEAD_MODEL_ID:00000000-0000-0000-0000-000000000001}"
      credentials-ref: "${TESSERA_CIRCLEAD_CREDENTIALS_REF:vault:secret/tessera/circlead/api-token}"
      poll-interval-seconds: 300

springdoc:
  cache:
    disabled: true

spring.ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:placeholder}
    chat:
      options:
        max-tokens: 4096
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    embedding:
      options:
        model: nomic-embed-text
  mcp:
    server:
      name: tessera-mcp
      version: 1.0.0
      type: SYNC
      sse-endpoint: /mcp/sse
      sse-message-endpoint: /mcp/message
      tool-change-notification: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      access: unrestricted
