# Production profile: TLS 1.3 + Vault config import (SEC-01, SEC-02).
# In reverse-proxy deployments (Caddy/nginx on IONOS), TLS terminates
# at the proxy and forward-headers-strategy=framework (in application.yml)
# propagates X-Forwarded-Proto so HSTS is still emitted.

server:
  port: 8443
  ssl:
    enabled: true
    key-store: ${TESSERA_TLS_KEYSTORE}
    key-store-password: ${TESSERA_TLS_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    enabled-protocols: TLSv1.3
    protocol: TLS

spring:
  config:
    import: "vault://secret/tessera/auth"
  cloud:
    vault:
      uri: ${VAULT_ADDR:http://localhost:8200}
      authentication: APPROLE
      app-role:
        role-id: ${VAULT_ROLE_ID:}
        secret-id: ${VAULT_SECRET_ID:}
      kv:
        enabled: true
        backend: secret
        default-context: tessera/auth
