spring:
  datasource:
    # URL/username/password injected via @DynamicPropertySource from AgePostgresContainer
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: TesseraHikariPool-ProjectionIT
      maximum-pool-size: 4
      connection-init-sql: "LOAD 'age'; SET search_path = ag_catalog, \"$user\", public;"
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true

server:
  forward-headers-strategy: framework

springdoc:
  cache:
    disabled: true

tessera:
  security:
    field-encryption:
      enabled: false
  auth:
    jwt-signing-key: "dGVzc2VyYS10ZXN0LWtleS0xMjM0NTY3ODkwYWJjZGVm"
    token-ttl-minutes: 15
    bootstrap-token: "test-bootstrap-secret"
