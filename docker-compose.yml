# Tessera local dev stack
#
# Services:
#   postgres-age: PostgreSQL 16 + Apache AGE 1.6.0 + pgvector (custom image)
#   ollama: Self-hosted Ollama for embedding generation (nomic-embed-text)
#   ollama-init: One-shot model pull for Ollama
#
# Vault is deferred to Phase 2 (Phase 0 D-08). No app service yet.
# AGE extension creation lives in Flyway V1 (plan 00-03 D-10), NOT here.
#
# D-09: The base image digest is one of THREE enforcement sites. Bumping it requires
# updating all three:
#   1. docker/age-pgvector/Dockerfile (base image FROM line)
#   2. fabric-core/src/test/java/dev/tessera/core/support/AgePostgresContainer.java (plan 00-03)
#   3. README.md "Image pinning" section

services:
  postgres-age:
    build:
      context: docker/age-pgvector
    container_name: tessera-postgres-age
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tessera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tessera}
      POSTGRES_DB: ${POSTGRES_DB:-tessera}
    ports:
      - "5432:5432"
    volumes:
      - tessera-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tessera} -d ${POSTGRES_DB:-tessera}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: tessera-ollama
    ports:
      - "11434:11434"
    volumes:
      - tessera-ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: tessera-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "ollama pull nomic-embed-text && echo 'Model ready'"]
    restart: "no"

  kafka:
    image: bitnami/kafka:3.9
    container_name: tessera-kafka
    profiles: ["kafka"]
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - tessera-kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  debezium-connect:
    image: quay.io/debezium/connect:3.4
    container_name: tessera-debezium-connect
    profiles: ["kafka"]
    environment:
      BOOTSTRAP_SERVERS: "kafka:9092"
      GROUP_ID: "tessera-connect"
      CONFIG_STORAGE_TOPIC: "tessera-connect-configs"
      OFFSET_STORAGE_TOPIC: "tessera-connect-offsets"
      STATUS_STORAGE_TOPIC: "tessera-connect-status"
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-age:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  debezium-connector-init:
    image: curlimages/curl:latest
    container_name: tessera-debezium-connector-init
    profiles: ["kafka"]
    depends_on:
      debezium-connect:
        condition: service_healthy
    volumes:
      - ./docker/debezium/connectors:/connectors:ro
    entrypoint:
      - sh
      - -c
      - >
        curl -s -X PUT http://debezium-connect:8083/connectors/tessera-outbox-connector/config
        -H 'Content-Type: application/json'
        -d @/connectors/tessera-outbox.json
        && echo 'Connector registered'
    restart: "no"

volumes:
  tessera-pgdata:
    driver: local
  tessera-ollama-data:
    driver: local
  tessera-kafka-data:
    driver: local
