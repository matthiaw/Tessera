spring:
  datasource:
    # URL/username/password injected via @DynamicPropertySource from AgePostgresContainer
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: TesseraHikariPool-IT
      maximum-pool-size: 4
      connection-init-sql: "LOAD 'age'; SET search_path = ag_catalog, \"$user\", public;"
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
